name: Check provider logo freshness

on:
  schedule:
    - cron: '0 3 1 * *'  # 03:00 UTC on the 1st of every month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-logos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Re-fetch and compare provider logos
        id: check
        run: |
          python3 - <<'PYEOF'
          import hashlib
          import os
          import urllib.request

          # provider key -> domain Google's favicon service should look up
          DOMAINS = {
              "kogan": "koganmobile.com.au",
              "amaysim": "amaysim.com.au",
              "everyday": "mobile.everyday.com.au",
              "lyca": "lycamobile.com.au",
              "telechoice": "telechoice.com.au",
              "boost": "boost.com.au",
              "aldi": "aldimobile.com.au",
              "lebara": "lebara.com.au",
              "onepass": "onepassmobile.com.au",
              "coles": "colesmobile.com.au",
              "vodafone": "vodafone.com.au",
              "konec": "konec.com.au",
              "telsim": "telsim.com.au",
              "telstra": "telstra.com.au",
              "optus": "optus.com.au",
          }

          LOGO_DIR = "images/logos"

          def fetch(url):
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=20) as resp:
                  return resp.read()

          def sha256(data):
              return hashlib.sha256(data).hexdigest()

          changed = []
          for key, domain in DOMAINS.items():
              path = os.path.join(LOGO_DIR, f"{key}.png")
              url = f"https://www.google.com/s2/favicons?domain={domain}&sz=128"
              try:
                  fresh = fetch(url)
              except Exception as exc:
                  print(f"::warning::Could not fetch {key} ({domain}): {exc}")
                  continue
              if not fresh or len(fresh) < 200:
                  print(f"::warning::Suspiciously small response for {key}, skipping")
                  continue
              existing = open(path, "rb").read() if os.path.exists(path) else b""
              if sha256(fresh) != sha256(existing):
                  with open(path, "wb") as f:
                      f.write(fresh)
                  changed.append(key)
                  print(f"Updated {key}.png")
              else:
                  print(f"{key}.png unchanged")

          gh_output = os.environ.get("GITHUB_OUTPUT")
          if gh_output:
              with open(gh_output, "a") as out:
                  out.write(f"changed={'true' if changed else 'false'}\n")
                  out.write(f"changed_list={', '.join(changed)}\n")
          PYEOF

      - name: Commit and push straight to main if anything changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/logos/
          git commit -m "chore: refresh provider logos (${{ steps.check.outputs.changed_list }})"
          git push
