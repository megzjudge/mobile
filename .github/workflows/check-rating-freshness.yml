name: Check ProductReview rating freshness

on:
  schedule:
    - cron: '0 4 1 * *'  # 04:00 UTC on the 1st of every month (offset from the logo check at 03:00)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  check-ratings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Re-fetch ProductReview ratings and diff against snapshot
        id: check
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import re
          import time
          import urllib.request

          SNAPSHOT_PATH = "productreview-snapshot.json"

          # provider slug -> full name, matched against the ProductReview URL used in index.html
          PROVIDERS = {
              "kogan-mobile": "Kogan Mobile",
              "amaysim": "Amaysim",
              "everyday-mobile-from-woolworths": "Everyday Mobile",
              "lycamobile": "Lycamobile",
              "telechoice-mobile": "TeleChoice",
              "boost-mobile": "Boost Mobile",
              "aldi-mobile": "ALDI Mobile",
              "lebara-mobile": "Lebara Mobile",
              "onepass-mobile": "OnePass Mobile",
              "coles-mobile": "Coles Mobile",
              "vodafone": "Vodafone (direct)",
              "telstra-1": "Telstra (direct)",
              "yes-optus-mobile": "Optus (direct)",
          }

          def fetch(url):
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=20) as resp:
                  return resp.read().decode("utf-8", errors="replace")

          snapshot = {}
          if os.path.exists(SNAPSHOT_PATH):
              snapshot = json.load(open(SNAPSHOT_PATH))

          changes = []
          errors = []
          new_snapshot = dict(snapshot)

          for slug, name in PROVIDERS.items():
              time.sleep(2)  # be polite, avoid tripping rate limits on 13 requests in a row
              url = f"https://www.productreview.com.au/listings/{slug}"
              try:
                  html = fetch(url)
              except Exception as exc:
                  print(f"::warning::Could not fetch {name} ({url}): {exc}")
                  errors.append(name)
                  continue

              m = re.search(r'"aggregateRating":\{[^}]*"ratingValue":"([\d.]+)"[^}]*"reviewCount":(\d+)', html)
              if not m:
                  print(f"::warning::No aggregateRating found for {name}, page structure may have changed")
                  errors.append(name)
                  continue

              rating = float(m.group(1))
              reviews = int(m.group(2))
              prev = snapshot.get(slug)

              if prev is None or prev.get("rating") != rating or prev.get("reviews") != reviews:
                  old_desc = f"{prev['rating']}★/{prev['reviews']}" if prev else "no prior record"
                  changes.append(f"- **{name}**: {old_desc} → {rating}★/{reviews} reviews (<{url}>)")
                  new_snapshot[slug] = {"rating": rating, "reviews": reviews}
              else:
                  print(f"{name}: unchanged ({rating}★/{reviews})")

          json.dump(new_snapshot, open(SNAPSHOT_PATH, "w"), indent=2, sort_keys=True)
          open(SNAPSHOT_PATH, "a").write("\n")

          gh_output = os.environ.get("GITHUB_OUTPUT")
          if gh_output:
              with open(gh_output, "a") as out:
                  out.write(f"changed={'true' if changes else 'false'}\n")
                  out.write("changes<<EOF\n")
                  out.write("\n".join(changes) if changes else "(none)")
                  out.write("\nEOF\n")
                  out.write("errors<<EOF\n")
                  out.write(", ".join(errors) if errors else "(none)")
                  out.write("\nEOF\n")
          PYEOF

      - name: Commit updated snapshot if anything changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add productreview-snapshot.json
          git commit -m "chore: update ProductReview rating snapshot"
          git push

      - name: Open an issue summarizing what moved
        if: steps.check.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changes = `${{ steps.check.outputs.changes }}`;
            const errors = `${{ steps.check.outputs.errors }}`;
            const bodyLines = [
              "ProductReview ratings moved for one or more providers since the last check. Trustpilot isn't checked here — it 403s on plain requests, so it stays a manual/annual check.",
              "",
              "## Changed",
              "",
              changes,
              "",
              "## Fetch errors this run",
              "",
              errors,
              "",
              "The snapshot file (`productreview-snapshot.json`) has already been updated and pushed. What hasn't been updated automatically: the rating pill's color class (good/warn/bad threshold), the accompanying rating-note prose in `index.html`, and the stat tiles at the top of the page if a \"best\"/\"lowest\" rating changed hands — those need a human pass."
            ];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "📈 ProductReview ratings changed — update index.html",
              body: bodyLines.join("\n"),
              assignees: [context.repo.owner],
            });
